{% extends 'base.html' %}
{% load i18n %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="mb-4 text-center">
                <h1 class="page-title mb-1">{% trans 'Set new password' %}</h1>
                <p class="text-muted" style="font-size:0.9rem;">{% trans 'Choose a strong new password.' %}</p>
            </div>
            <div class="card p-4">
                <form action="" method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger" style="font-size:0.82rem; font-weight:600;">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">{% trans 'Set password' %}</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
