{% extends 'base.html' %}
{% load i18n %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card p-5 text-center">
                <h2 class="page-title mt-3 mb-2" style="font-size:1.4rem;">{% trans 'Email verified!' %}</h2>
                <p class="text-muted mb-4" style="font-size:0.9rem;">
                    {% trans 'Your email has been verified. You can now login.' %}
                </p>
                <a href="{% url 'users:login' %}" class="btn btn-primary px-4">{% trans 'Log in' %}</a>
            </div>
        </div>
    </div>
{% endblock %}
