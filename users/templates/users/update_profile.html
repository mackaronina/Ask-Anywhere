{% extends 'base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="mb-4">
                <h1 class="page-title mb-1">Edit profile</h1>
                <p class="text-muted" style="font-size:0.9rem;">Update your profile information.</p>
            </div>
            <div class="card p-4">
                <form action="" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text text-muted" style="font-size:0.78rem;">{{ field.help_text }}</div>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger" style="font-size:0.82rem; font-weight:600;">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2 pt-1">
                        <button type="submit" class="btn btn-primary px-4">Save</button>
                        <button type="button" onclick="history.back();" class="btn btn-outline-secondary px-4">Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
