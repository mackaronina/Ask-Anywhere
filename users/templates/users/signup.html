{% extends 'base.html' %}

{% block content %}
    <h1>Create a new account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>
    <p>Already have an account? <a href="{% url 'users:login' %}">Log in</a></p>

{% endblock %}
