{% extends 'base.html' %}
{% block content %}
    <h1>Log in to your account</h1>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="{% url 'users:signup' %}">Sign up</a></p>
{% endblock %}
