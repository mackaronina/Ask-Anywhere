{% extends 'base.html' %}

{% block content %}
    <h1>Login to an existing account</h1>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="{% url 'users:signup' %}">Sign up</a></p>
    <a href="{% url 'users:password_reset' %}">Forgot your password?</a>
{% endblock %}
