{% extends 'base.html' %}
{% load i18n %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card p-5 text-center">
                <h2 class="page-title mt-3 mb-2" style="font-size:1.4rem;">{% trans 'Password changed!' %}</h2>
                <p class="text-muted mb-4">{% trans 'Your password has been updated successfully.' %}</p>
                <a href="{% url 'users:profile' %}" class="btn btn-primary px-4">{% trans 'Back to profile' %}</a>
            </div>
        </div>
    </div>
{% endblock %}
