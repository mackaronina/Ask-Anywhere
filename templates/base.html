<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AskAnywhere</title>
</head>
<body>
<header>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'questions_index' %}">Explore</a>
    <a href="{% url 'random_question' %}">Random question</a>
    <a href="{% url 'create_question' %}">Create question</a>
    {% if user.is_authenticated %}
        <a href="{% url 'users:profile' %}">Profile</a>
    {% else %}
        <a href="{% url 'users:login' %}">Log in</a>
        <a href="{% url 'users:signup' %}">Sign up</a>
    {% endif %}
</header>
{% block content %}
{% endblock %}
<footer>
    <p>© 2026 Mackaronina <a href="https://github.com/mackaronina">Github</a></p>
</footer>
</body>
</html>
