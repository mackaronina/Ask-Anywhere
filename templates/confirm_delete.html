{% extends 'base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4 text-center">
                <h2 class="page-title mb-2" style="font-size:1.4rem;">Confirm deletion</h2>
                <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ entity_name }}</strong>? This
                    action cannot be undone.</p>
                <div class="d-flex gap-2 justify-content-center">
                    <form action="" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">Delete</button>
                    </form>
                    <button onclick="history.back();" class="btn btn-outline-secondary px-4">Cancel</button>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
