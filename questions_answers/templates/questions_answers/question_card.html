{% load users_tags %}
{% if question.has_solution %}
    <p>✔ Has solution</p>
{% endif %}
<h4><a href="{{ question.get_absolute_url }}">{{ question.title }}</a></h4>
{% user_link question.user %}
<p>{{ question.text|truncatechars:128 }}</p>
<p>{{ question.get_rating }} votes</p>
<p>{{ question.answers.count }} answers</p>
<p>Asked at {{ question.created_at|date:'d.m.Y' }}<p>
