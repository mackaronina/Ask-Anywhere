{% load martortags %}
{% load users_tags %}

<div class="card p-3 card-clickable {% if answer.is_solution %}answer-solution{% endif %}"
     onclick="window.location='{{ answer.get_absolute_url }}'">
    <a class="card-main-link" href="{{ answer.get_absolute_url }}" aria-label="View answer"></a>
    <div class="d-flex gap-3" style="min-height: 80px;">
        <div class="d-flex flex-column align-items-center gap-1 pt-1" style="min-width:52px;">
            <div class="text-center">
                <div style="font-weight:800; font-size:1.1rem; color: var(--orange)">{{ answer.get_rating }}</div>
                <div style="font-size:0.7rem; color: var(--text-muted); font-weight:600;">votes</div>
            </div>
        </div>

        <div class="flex-grow-1 min-w-0 d-flex flex-column">
            <div class="d-flex align-items-start justify-content-between gap-2 mb-1">
                <div class="flex-grow-1 min-w-0">
                    {% if answer.is_solution %}
                        <span class="solved-badge"><i class="bi bi-check-circle-fill"></i> Solution</span>
                    {% endif %}
                </div>
                <div class="card-user-link flex-shrink-0">
                    {% user_link answer.user %}
                </div>
            </div>

            <p class="text-muted mb-2 flex-grow-1" style="font-size:0.875rem; line-height:1.5;">
                {{ answer.text|safe_markdown|striptags|truncatechars:128 }}
            </p>

            <div class="d-flex justify-content-end mt-auto">
                <span class="stat-pill"><i class="bi bi-clock"></i> {{ answer.created_at|date:'d.m.Y' }}</span>
            </div>
        </div>
    </div>
</div>
