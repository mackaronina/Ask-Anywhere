{% extends 'base.html' %}

{% block content %}
    <h1>Answering to <a href="{{ question.get_absolute_url }}">{{ question.title }}</a></h1>
    <p>{{ question.text }} </p>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Publish</button>
    </form>
{% endblock %}
